server:
  port: 8090


spring:
  application:
    name: loan
  datasource:
    url: jdbc:h2:mem:testdb
    password: ''
    driverClassName: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
